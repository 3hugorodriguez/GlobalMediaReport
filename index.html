<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMR — Global Exchange</title>
    <meta name="description" content="Global Media Report — Global Exchange">
    <meta property="og:title" content="GMR — Global Exchange">
    <meta property="og:image" content="https://assets-sharedcontent.global-exchange.com/1dced37c-b424-4190-a730-3c9ce29c6369.svg">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body data-theme="light">

    <!-- CURSOR CUSTOM -->
    <div class="cursor" id="cursor"></div>
    <div class="cursor-follower" id="cursorFollower"></div>

    <!-- PROGRESS -->
    <div class="progress-bar" id="progressBar"></div>

    <!-- HEADER -->
    <header class="header" id="header">
        <div class="header-inner">
            <a class="header-logo" href="#">
                <img src="https://assets-sharedcontent.global-exchange.com/1dced37c-b424-4190-a730-3c9ce29c6369.svg"
                     alt="Global Exchange" id="logoImg">
            </a>

            <div class="header-center" id="headerMeta">
                <span class="header-label">Global Media Report</span>
                <span class="header-dot">·</span>
                <span class="header-month" id="headerMonth">—</span>
                <span class="header-dot">·</span>
                <span class="header-count" id="headerCount">—</span>
            </div>

            <div class="header-actions">
                <button class="icon-btn" id="searchToggle" aria-label="Buscar">
                    <i class="fas fa-search"></i>
                </button>
                <button class="icon-btn" id="viewToggle" aria-label="Vista" title="Vista compacta">
                    <i class="fas fa-grip-lines"></i>
                </button>
                <button class="icon-btn" id="themeToggle" aria-label="Tema">
                    <i class="fas fa-circle-half-stroke"></i>
                </button>
                <button class="icon-btn" id="briefingToggle" aria-label="Briefing">
                    <i class="fas fa-layer-group"></i>
                </button>
            </div>
        </div>

        <!-- SEARCH BAR -->
        <div class="search-bar" id="searchBar">
            <div class="search-bar-inner">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput"
                       placeholder="Buscar en todas las noticias...">
                <kbd>ESC</kbd>
            </div>
        </div>
    </header>

    <!-- FILTERS -->
    <div class="filters-strip" id="filtersStrip">
        <div class="filters-inner">
            <div class="filter-group" id="catFilters">
                <button class="filter-chip active" data-category="all">
                    <span class="chip-dot" style="background:#0a0a0a"></span>
                    Todo
                </button>
            </div>
            <div class="filter-divider"></div>
            <div class="filter-group" id="monthFilters">
                <button class="filter-chip active" data-month="all">Todos</button>
            </div>
            <button class="filter-reset" id="resetFilters">
                <i class="fas fa-xmark"></i>
            </button>
        </div>
    </div>

    <!-- HERO SECTION — se rellena dinámicamente -->
    <section class="hero-section" id="heroSection" style="display:none"></section>

    <!-- MAIN -->
    <main class="main" id="newsContainer">
        <!-- Skeleton -->
        <div class="skeleton-wrap" id="skeletonLoader">
            <div class="skeleton-hero"></div>
            <div class="skeleton-grid">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
        </div>
    </main>

    <!-- EMPTY -->
    <div class="empty-state" id="emptyState">
        <span class="empty-icon">◯</span>
        <h3>Sin resultados</h3>
        <p>Ajusta los filtros o la búsqueda</p>
        <button onclick="resetAllFilters()">Resetear</button>
    </div>

    <!-- BRIEFING PANEL -->
    <div class="panel-overlay" id="panelOverlay"></div>
    <aside class="briefing-panel" id="briefingPanel">
        <div class="panel-header">
            <span class="panel-title">Briefing</span>
            <button class="panel-close" id="panelClose">
                <i class="fas fa-xmark"></i>
            </button>
        </div>
        <div class="panel-body" id="briefingBody"></div>
        <div class="panel-footer">
            <button onclick="window.print()">
                <i class="fas fa-print"></i> Imprimir
            </button>
        </div>
    </aside>

    <!-- BACK TO TOP -->
    <button class="back-top" id="backTop">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- FOOTER -->
    <footer class="footer">
        <span>© 2026 Global Exchange · Comunicación Corporativa</span>
        <span>GMR v5.0</span>
    </footer>

    <!-- TOAST -->
    <div class="toasts" id="toasts"></div>

    <script src="api-handler-simple.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof initGMR === 'function') initGMR();
        });
    </script>
</body>
</html>
